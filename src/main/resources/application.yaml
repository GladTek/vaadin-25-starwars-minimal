server:
  port: ${PORT:8080}

logging:
  level:
    org.atmosphere: warn

vaadin:
  launch-browser: false
  allowed-packages: com.vaadin,org.vaadin,com.flowingcode,com.gladtek
  copilot:
    enable: true
  heartbeat-interval: 10
  close-idle-sessions: true

rybbit:
  analytics:
    enabled: false
    site-id: ${RYBBIT_ANALYTICS_SITE_ID:RYBBIT-DEMO-ID}
    script-url: ${RYBBIT_ANALYTICS_SCRIPT_URL:https://analytics.example.com/api/script.js}
    enable-web-vitals: ${RYBBIT_ANALYTICS_ENABLE_WEB_VITALS:false}
app:
  meta:
    og:
      title: ${APP_META_OG_TITLE:Vaadin 25 Star Wars Demo}
      description: ${APP_META_OG_DESCRIPTION:A Star Wars-themed demo showcasing Vaadin 25 Signals, dynamic light/dark modes, and full internationalization (i18n) with RTL support.}
      image: ${APP_META_OG_IMAGE:https://starwars.gladtek.com/icons/icon.png}
      url: ${APP_META_OG_URL:https://starwars.gladtek.com}
      type: ${APP_META_OG_TYPE:website}
