server:
  port: ${PORT:8080}

logging:
  level:
    org.atmosphere: warn

vaadin:
  launch-browser: false
  allowed-packages: com.vaadin,org.vaadin,com.flowingcode,com.gladtek
  copilot:
    enable: true

rybbit:
  analytics:
    enabled: false
    site-id: ${RYBBIT_ANALYTICS_SITE_ID:RYBBIT-DEMO-ID}
    script-url: ${RYBBIT_ANALYTICS_SCRIPT_URL:https://analytics.example.com/api/script.js}
    enable-web-vitals: ${RYBBIT_ANALYTICS_ENABLE_WEB_VITALS:false}
app:
  meta:
    og:
      title: "Vaadin 25 Star Wars Demo"
      description: "A modern small demo application built with Vaadin 25 and Spring Boot, demonstrating advanced UI concepts, dynamic scheming dark/light mode, and full internationalization within a Star Wars-themed context."
      image: "https://starwars.gladtek.com/icons/icon.png"
      url: "https://starwars.gladtek.com"
      type: "website"
